<!DOCTYPE html>
<html lang="en">
<head>
  <title>Stylish Images</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body style="background-color:#111; color:white;">

<div class="container mt-4 text-center">
  <h2> Cool Image Styles </h2>
</div>

<!-- Rounded -->
<div class="container mt-4 text-center">
  <h4> Rounded Style</h4>
  <img src="https://picsum.photos/304/236?grayscale" class="rounded img-fluid">
</div>

<!-- Circle -->
<div class="container mt-4 text-center">
  <h4> Circle Style</h4>
  <img src="https://picsum.photos/300/300?random=2" class="rounded-circle img-fluid">
</div>

<!-- Thumbnail -->
<div class="container mt-4 text-center">
  <h4>Thumbnail Style</h4>
  <img src="https://picsum.photos/304/236?random=3" class="img-thumbnail">
</div>

<!-- Align -->
<div class="container mt-4">
  <h4 class="text-center"> Align Images</h4>
  <img src="https://picsum.photos/304/236?random=4" class="float-left rounded">
  <img src="https://picsum.photos/305/236?random=5" class="float-right rounded">
</div>

<!-- Center -->
<div class="container mt-5 text-center">
  <h4> Center Image</h4>
  <img src="https://picsum.photos/300/200?random=6" class="mx-auto d-block rounded" style="width:40%">
</div>

<!-- Responsive -->
<div class="container mt-4 text-center">
  <h4> Responsive Image</h4>
  <img src="https://picsum.photos/460/300?random=7" class="img-fluid rounded">
</div>

</body>
</html>
